name: docker

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string

permissions: {}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup QEMU user-mode emulation
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          buildkitd-flags: --debug
          # See https://github.com/docker/build-push-action/issues/654#issuecomment-1285190151
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 1
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (mirakc/timeshift-gerbera)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: true
          context: ./gerbera
          tags: |
            docker.io/mirakc/timeshift-gerbera:${{ inputs.version }}
            ${{ inputs.version == 'main' && '' || 'docker.io/mirakc/timeshift-gerbera:latest' }}
          build-args: |
            TAG=${{ inputs.version }}
          platforms: |
            linux/amd64
            linux/arm/v7
            linux/arm64/v8
      - name: Build and push (mirakc/timeshift-samba)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          push: true
          context: ./samba
          tags: |
            docker.io/mirakc/timeshift-samba:${{ inputs.version }}
            ${{ inputs.version == 'main' && '' || 'docker.io/mirakc/timeshift-samba:latest' }}
          build-args: |
            TAG=${{ inputs.version }}
          platforms: |
            linux/386
            linux/amd64
            linux/arm/v7
            linux/arm64/v8
